<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINDEX - Portal za učence</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --win-gray: #d4d0c8;
            --win-blue: #0a246a;
        }

        body {
            font-family: 'Tahoma', 'Segoe UI', sans-serif;
            background-color: var(--win-gray);
            margin: 0; padding: 0; height: 100vh;
        }

        .hidden { display: none !important; }
        .bold { font-weight: bold; }
        
        .win-btn {
            background: #e0e0e0; border: 2px solid; border-color: #fff #808080 #808080 #fff;
            padding: 4px 15px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: bold;
        }
        .win-btn:active { border-style: inset; }

        .top-header {
            background: var(--win-blue); color: white; height: 40px; 
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
            font-weight: bold; font-size: 16px;
        }
        
        .main-container { padding: 20px; max-width: 900px; margin: 0 auto; }

        /* Login */
        .login-frame { 
            background: #c0c0c0; border: 2px solid #808080; padding: 20px; 
            width: 300px; margin: 100px auto; text-align: center; box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        .login-inp { width: 90%; margin-bottom: 10px; padding: 5px; border: 2px inset white; }

        /* Videz tabel */
        .data-box { background: white; border: 2px solid #808080; margin-bottom: 20px; padding: 15px; }
        h2 { font-size: 18px; margin-top: 0; border-bottom: 2px solid black; padding-bottom: 5px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #a0a0a0; padding: 6px; text-align: center; }
        th { background: #e0e0e0; font-weight: bold; }
        
        .grade-pisno { color: red; font-weight: bold; }
        .grade-ustno { color: black; font-weight: bold; }
        .grade-izdelek { color: blue; font-weight: bold; }
        
        .stat-green { color: green; font-weight: bold; }
        .stat-red { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <div id="page-loader" style="text-align: center; padding-top: 100px;">
        <h2>Nalaganje podatkov...</h2>
    </div>

    <div id="page-login" class="hidden">
        <div class="login-frame">
            <h2 style="border:none; margin-bottom:15px;">MINDEX Učenec</h2>
            <input type="text" id="login-u" class="login-inp" placeholder="Uporabniško ime"><br>
            <input type="password" id="login-p" class="login-inp" placeholder="Geslo"><br>
            <button class="win-btn" onclick="tryLogin()">PRIJAVA</button>
        </div>
    </div>

    <div id="page-app" class="hidden">
        <div class="top-header">
            <span>MINDEX - Portal za učence</span>
            <div>
                <span id="user-name-display" style="margin-right: 15px;"></span>
                <button class="win-btn" style="padding: 2px 10px;" onclick="location.reload()">Odjava</button>
            </div>
        </div>

        <div class="main-container">
            
            <div class="data-box">
                <h2>Moje Ocene</h2>
                <table id="grades-table">
                    <thead>
                        <tr>
                            <th style="text-align: left; width: 30%;">Predmet</th>
                            <th>1. Obdobje</th>
                            <th>2. Obdobje</th>
                            <th style="width: 15%;">Končna</th>
                        </tr>
                    </thead>
                    <tbody id="grades-body"></tbody>
                </table>
            </div>

            <div class="data-box">
                <h2>Moji Izostanki</h2>
                <div style="margin-bottom: 10px; background: #f0f0f0; padding: 10px; border: 1px solid #ccc;">
                    Skupaj opravičeno: <span class="stat-green" id="stat-o">0</span> | 
                    Skupaj neopravičeno: <span class="stat-red" id="stat-n">0</span>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th style="width: 15%;">Datum</th>
                            <th style="width: 25%;">Ure</th>
                            <th style="width: 20%;">Status</th>
                            <th>Opomba</th>
                        </tr>
                    </thead>
                    <tbody id="abs-body"></tbody>
                </table>
            </div>

        </div>
    </div>

<script>
// Povezava na isto Firebase bazo
const firebaseConfig = { databaseURL: "https://mindex-b92ed-default-rtdb.europe-west1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

let db = {};
let currentUser = null;

// Branje baze ob zagonu
database.ref('mindex_db').once('value').then(snapshot => {
    if(snapshot.exists()) db = snapshot.val();
    
    // Zaščita pred praznimi podatki
    if(!db.users) db.users = [];
    if(!db.classes) db.classes = [];
    if(!db.subjects) db.subjects = [];
    if(!db.grades) db.grades = [];
    if(!db.entries) db.entries = [];

    document.getElementById('page-loader').classList.add('hidden');
    document.getElementById('page-login').classList.remove('hidden');
});

function tryLogin() {
    const u = document.getElementById('login-u').value.trim();
    const p = document.getElementById('login-p').value.trim();
    
    // 1. Preveri, če je učenec v db.users (iz EWI)
    let student = db.users.find(x => x.username === u && x.password === p && x.role === 'student');
    
    // 2. Če ga ni tam, preveri še v db.classes (iz Redovalnice)
    if (!student) {
        for (let c of db.classes) {
            if (!c.students) continue;
            let s = c.students.find(st => st.username === u && st.password === p);
            if (s) { student = s; break; }
        }
    }

    if (student) {
        currentUser = student;
        document.getElementById('page-login').classList.add('hidden');
        document.getElementById('page-app').classList.remove('hidden');
        document.getElementById('user-name-display').innerText = currentUser.name;
        
        renderGrades();
        renderAbsences();
    } else {
        alert("Napačno uporabniško ime ali geslo!");
    }
}

function renderGrades() {
    const tbody = document.getElementById('grades-body');
    tbody.innerHTML = '';
    
    db.subjects.forEach(subject => {
        // Najdi vse ocene za tega učenca pri tem predmetu
        const myGrades = db.grades.filter(g => g.studentId === currentUser.id && g.subjectId === subject.id);
        
        if (myGrades.length === 0) return; // Ne prikaži predmeta, če ni ocen
        
        // Loči po obdobjih in končni
        const grades1 = myGrades.filter(g => g.period === 1 && !g.isFinal);
        const grades2 = myGrades.filter(g => g.period === 2 && !g.isFinal);
        const final = myGrades.find(g => g.isFinal);

        const formatGrades = (arr) => arr.map(g => {
            let cls = g.type === 'PISNO' ? 'grade-pisno' : (g.type === 'IZDELEK' ? 'grade-izdelek' : 'grade-ustno');
            return `<span class="${cls}" style="margin: 0 4px;" title="Vpisal: ${g.authorName || '?'}">${g.value}</span>`;
        }).join('');

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td style="text-align: left; font-weight: bold;">${subject.name}</td>
            <td>${formatGrades(grades1)}</td>
            <td>${formatGrades(grades2)}</td>
            <td style="font-weight: bold; font-size: 16px;">${final ? final.value : ''}</td>
        `;
        tbody.appendChild(tr);
    });
}

function renderAbsences() {
    const tbody = document.getElementById('abs-body');
    tbody.innerHTML = '';
    
    let absencesByDate = {};
    let countO = 0, countN = 0;

    // Preiščemo vse ure v dnevniku
    db.entries.forEach(entry => {
        if (!entry.absentees) return;
        const abs = entry.absentees.find(a => parseInt(a.studentId) === parseInt(currentUser.id));
        
        if (abs) {
            if(abs.status === 'O') countO++;
            if(abs.status === 'N') countN++;

            if (!absencesByDate[entry.date]) absencesByDate[entry.date] = { periods: [], statuses: new Set(), notes: new Set() };
            
            absencesByDate[entry.date].periods.push(entry.period);
            absencesByDate[entry.date].statuses.add(abs.status);
            if (abs.note) absencesByDate[entry.date].notes.add(abs.note);
        }
    });

    document.getElementById('stat-o').innerText = countO;
    document.getElementById('stat-n').innerText = countN;

    // Razvrsti datume padajoče
    const parseDate = (dStr) => {
        const p = dStr.replace(/\s/g, '').split('.');
        return new Date(p[2], p[1]-1, p[0]).getTime();
    };
    let dates = Object.keys(absencesByDate).sort((a, b) => parseDate(b) - parseDate(a));

    dates.forEach(date => {
        let data = absencesByDate[date];
        let periodsStr = data.periods.sort((a,b)=>a-b).join('. ') + '.';
        let statusesStr = Array.from(data.statuses).join(', ');
        let notesStr = Array.from(data.notes).join('; ');
        
        let statColor = 'black';
        if (statusesStr.includes('N')) statColor = 'red';
        else if (statusesStr.includes('O')) statColor = 'green';

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${date}</td>
            <td class="bold">${periodsStr}</td>
            <td style="color: ${statColor}; font-weight: bold;">${statusesStr === '?' ? 'Odprto' : statusesStr}</td>
            <td style="font-size: 12px; text-align: left;">${notesStr}</td>
        `;
        tbody.appendChild(tr);
    });
}
</script>
</body>
</html>
